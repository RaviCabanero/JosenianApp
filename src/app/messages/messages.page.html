<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="goBack()">
        <ion-icon slot="icon-only" name="arrow-back"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>Messages</ion-title>
  </ion-toolbar>

  <ion-toolbar class="search-toolbar">
    <ion-searchbar
      (ionChange)="onSearchChange($event)"
      placeholder="Search members..."
      class="search-bar">
    </ion-searchbar>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="messages-container">

    <!-- Loading -->
    <div class="loading-state" *ngIf="isLoading">
      <ion-spinner name="crescent"></ion-spinner>
      <p>Loading members...</p>
    </div>

    <!-- Conversations List -->
    <div class="conversations-section" *ngIf="!isLoading && filteredConversations.length > 0">
      <ion-list class="conversations-list">
        <ion-item
          class="conversation-item"
          *ngFor="let conversation of filteredConversations"
          (click)="openChat(conversation.uid)"
          lines="none">
          <div class="conversation-content">
            <div class="avatar-container">
              <ion-avatar class="conversation-avatar">
                <div class="avatar-placeholder">{{ conversation.avatar }}</div>
              </ion-avatar>
            </div>
            <div class="conversation-info">
              <div class="conversation-header">
                <h3 class="conversation-name">{{ conversation.name }}</h3>
                <ion-badge [color]="conversation.role === 'Alumni' ? 'tertiary' : 'primary'" class="role-badge">
                  {{ conversation.role }}
                </ion-badge>
              </div>
              <p class="conversation-role">{{ conversation.department }}</p>
            </div>
          </div>
        </ion-item>
      </ion-list>
    </div>

    <!-- Empty State -->
    <div class="empty-state" *ngIf="!isLoading && filteredConversations.length === 0">
      <ion-icon name="chatbubbles-outline"></ion-icon>
      <h2>No members found</h2>
      <p>Approved members will appear here.</p>
    </div>

  </div>
</ion-content>
