<ion-content [fullscreen]="true" class="login-content">
  <div class="login-container">
    <div class="logo-section">
      <img src="assets/logo2.2.png" alt="Josenian Logo" class="logo-image" />
      <h1 class="app-name">JosenianLink</h1>
      <p class="app-tagline">Network & Connect</p>
    </div>

    <ion-card class="login-card">
      <ion-card-content>
        <div class="error-message" *ngIf="loginError">
          <ion-icon name="alert-circle"></ion-icon>
          <span>{{ loginError }}</span>
        </div>

        <div class="form-group">
          <label class="form-label">Username or Email</label>
          <div class="input-wrapper">
            <ion-icon name="person" class="input-icon"></ion-icon>
            <ion-input
              [(ngModel)]="username"
              placeholder="Enter your username"
              type="text"
              class="form-input"
              (keypress)="handleKeyPress($event)"
            ></ion-input>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-wrapper">
            <ion-icon name="lock-closed" class="input-icon"></ion-icon>
            <ion-input
              [(ngModel)]="password"
              [type]="showPassword ? 'text' : 'password'"
              placeholder="Enter your password"
              class="form-input"
              (keypress)="handleKeyPress($event)"
            ></ion-input>
            <ion-button
              fill="clear"
              class="toggle-password"
              (click)="togglePasswordVisibility()"
            >
              <ion-icon
                slot="icon-only"
                [name]="showPassword ? 'eye-off' : 'eye'"
              ></ion-icon>
            </ion-button>
          </div>
        </div>

        <div class="forgot-password">
          <ion-button fill="clear" color="medium" class="link-button">
            Forgot Password?
          </ion-button>
        </div>

        <ion-button
          expand="block"
          class="login-button"
          (click)="login()"
          [disabled]="isLoading"
        >
          <span *ngIf="!isLoading">Login</span>
          <ion-spinner *ngIf="isLoading" name="crescent"></ion-spinner>
        </ion-button>

        <div class="divider">
          <span>Don't have an account?</span>
        </div>

        <ion-button
          expand="block"
          fill="outline"
          class="register-button"
          (click)="navigateToRegister()"
        >
          Create Account
        </ion-button>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
